<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" width="320" height="56">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=League+Spartan:wght@800&amp;family=Outfit:wght@600;700&amp;display=swap');
      .title-marg { font-family: 'League Spartan', 'Arial Black', sans-serif; font-weight: 800; font-size: 32px; fill: #E53935; letter-spacing: -0.01em; }
      .title-darshak { font-family: 'League Spartan', 'Arial Black', sans-serif; font-weight: 800; font-size: 32px; fill: #FFC107; letter-spacing: -0.01em; }
      .tagline { font-family: 'Outfit', 'Arial', sans-serif; font-weight: 700; font-size: 9.5px; fill: #E2E8F0; letter-spacing: 0.32em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- MARGDARSHAK text -->
  <text x="160" y="32" text-anchor="middle">
    <tspan class="title-marg">MARG</tspan><tspan class="title-darshak">DARSHAK</tspan>
  </text>

  <!-- SHIKSHAN SANSTHAN tagline -->
  <text x="160" y="48" text-anchor="middle" class="tagline">SHIKSHAN SANSTHAN</text>
</svg>
